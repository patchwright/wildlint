id: wl001-javascript-replace-as-strip
invalid:
  - |-
    if (s.startsWith("/blob/")) {
        s = s.replaceAll("/blob/", "");
    }
valid:
  - |-
    s = s.replaceAll("/blob/", "");
  - |-
    if (s.startsWith("/blob/")) {
        s = s.replaceAll("/x/", "");
    }
  - |-
    s = s.replace("/blob/", "");
  - |-
    s = s.startsWith("/blob/") ? s.slice(6) : s
