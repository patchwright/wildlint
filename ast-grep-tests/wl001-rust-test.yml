id: wl001-rust-replace-as-strip
invalid:
  - |-
    if s.starts_with("/blob/") {
        let x = s.replace("/blob/", "");
    }
valid:
  - |-
    let x = s.replace("/blob/", "");
  - |-
    if s.starts_with("/blob/") {
        let x = s.replace("/x/", "");
    }
  - |-
    let x = s.strip_prefix("/blob/");
