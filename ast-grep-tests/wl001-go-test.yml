id: wl001-go-replace-as-strip
invalid:
  - |-
    func f() {
        if strings.HasPrefix(s, "/blob/") {
            s = strings.ReplaceAll(s, "/blob/", "")
        }
    }
valid:
  - |-
    func f() { s = strings.ReplaceAll(s, "/blob/", "") }
  - |-
    func f() {
        if strings.HasPrefix(s, "/blob/") {
            s = strings.ReplaceAll(s, "/x/", "")
        }
    }
  - |-
    func f() { s = strings.Replace(s, "/blob/", "", 1) }
  - |-
    func f() { s = strings.TrimPrefix(s, "/blob/") }
