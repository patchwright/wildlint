id: wl001-go-replace-as-strip
# Go is PEDANTIC candidate-only (tree-sitter-go has no else_clause node, so the
# guard can't exclude else branches). These cases assert the candidate behavior:
# ReplaceAll-to-empty matches (for human review); the safe forms don't.
invalid:
  - |-
    strings.ReplaceAll(path, "/blob/", "")
valid:
  - |-
    strings.Replace(path, "/blob/", "", 1)
  - |-
    strings.TrimPrefix(path, "/blob/")
