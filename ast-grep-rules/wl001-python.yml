# WL001 — guarded replace-to-empty as prefix/suffix strip (Python)
# Real-bug origin: nephila/giturlparse PR #149 (merged #152, cf249252). Bug shape:
# `if path.startswith('/blob/'): ... path.replace('/blob/', '')` — str.replace
# removes EVERY occurrence, so "/blob/x/blob/y" -> "x/y" (data loss). Meant
# str.removeprefix / str.removesuffix.
#
# This rule is the ast-grep equivalent of the Python CLI's default-tier WL001
# (src/wildlint/checkers.py): it matches the replace call ONLY when it is inside
# an if-statement whose condition is a startswith/endswith call on the SAME
# receiver ($RECV) with the SAME marker literal ($LIT). That guard proof is what
# makes a default-tier rule safe — without it, `.replace(x, "")` fires on every
# generic sanitization call (see 0.7.0's false-positive flood).
#
# Scope limit: the if-pattern matches a BARE `if RECV.startswith(LIT):` only.
# Compound guards (`if x.startswith(m) and not skip:`) are not matched and fall
# through to manual review — rare in practice; the canonical giturlparse shape is
# a bare startswith.
#
# ast-grep mechanics: `inside` requires `stopBy: end` to descend into the if-body
# (the default does not). Quote-style is not normalized, so the replace pattern
# splits into two `any:` arms (single + double quote). $RECV/$LIT unify across
# the `inside` boundary, giving the same-receiver/same-marker precision.
id: wl001-python-replace-as-strip
language: Python
rule:
  any:
    - pattern: $RECV.replace($LIT, '')
    - pattern: $RECV.replace($LIT, "")
  inside:
    stopBy: end
    any:
      - pattern: 'if $RECV.startswith($LIT): $$$BODY'
      - pattern: 'if $RECV.endswith($LIT): $$$BODY'
  # Exclude elif/else branches — those run when the guard is FALSE, so a replace
  # there is NOT a guarded strip. This is the round-1 / 0.7.2 elif-else false
  # positive; tree-sitter-python names them elif_clause / else_clause (siblings
  # of the consequence block). `stopBy: end` walks up to find them.
  not:
    inside:
      stopBy: end
      any:
        - kind: elif_clause
        - kind: else_clause
message: |
  WL001: $RECV.replace(marker, "") inside `if $RECV.startswith(marker):` removes
  EVERY occurrence of the marker (Python str.replace is global), corrupting
  values that contain it twice. Use str.removeprefix / str.removesuffix.
  Origin: nephila/giturlparse #149 (merged #152, cf249252).
severity: warning
metadata:
  code: WL001
  tier: default
  origin: nephila/giturlparse#149
  fix_merge: "#152 cf249252ed5"
  guard_proven: true
