# WL001 — replace-to-empty used as a prefix/suffix strip (Python)
# Real-bug origin: nephila/giturlparse PR #149 (superseded by merged #152, cf249252).
# Bug shape: `if path.startswith('/blob/'): ... path.replace('/blob/', '')` —
# str.replace removes EVERY occurrence, so "/blob/x/blob/y" -> "x/y" (data loss).
# Author meant str.removeprefix / str.removesuffix.
#
# ast-grep notes:
#  1. A single rule cannot AND a call with an enclosing if-guard in one pattern,
#     so this rule fires on the replace-to-empty call site wherever the receiver
#     is bound. The Python checker (checkers.py) additionally PROVES the guard
#     holds; treat ast-grep hits as candidates to review against the surrounding
#     startswith/endswith, not as confirmed bugs.
#  2. ast-grep does NOT normalize Python string-literal quote style: a pattern
#     literal `""` will not match source `''` and vice versa. We therefore split
#     into two `any:` arms — one for each empty-literal quote style — so both
#     `path.replace('/blob/', '')` and `path.replace("/blob/", "")` fire.
id: wl001-python-replace-as-strip
language: Python
rule:
  any:
    - pattern: $RECV.replace($LIT, '')
    - pattern: $RECV.replace($LIT, "")
message: |
  WL001: $RECV.replace(marker, "") guarded by startswith/endswith(marker)
  removes EVERY occurrence of the marker (not just the prefix/suffix).
  Use str.removeprefix / str.removesuffix instead.
  Origin: nephila/giturlparse #149 (fix merged in #152, cf249252).
severity: warning
metadata:
  code: WL001
  tier: default
  origin: nephila/giturlparse#149
  fix_merge: "#152 cf249252ed5"
