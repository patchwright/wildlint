# WL001 — ReplaceAll-to-empty as a candidate strip (Go) — PEDANTIC
# Real-bug origin (cross-language analogue): nephila/giturlparse #149 (Python),
# cf249252. strings.ReplaceAll(s, marker, "") substitutes EVERY occurrence, so a
# value containing the marker twice is corrupted when the intent was to drop a
# prefix/suffix guarded by strings.HasPrefix/HasSuffix. Idiomatic fix:
# strings.TrimPrefix / strings.TrimSuffix.
#
# Tier note: PEDANTIC (candidate-only). The other four WL001 language variants
# ship a guard-PROVEN default-tier rule (replace inside an if guarded by
# startsWith/HasPrefix on the same receiver+marker, with elif/else branches
# excluded via `not: { inside: else_clause }`). Go CANNOT match that precision:
# tree-sitter-go has no else_clause node (the else body is a bare positional
# block, indistinguishable from the consequence by kind), so the else branch --
# reached when the guard is FALSE -- cannot be structurally excluded, and
# `not: { follows: else }` does not work either. Shipping an unprovable guard at
# default tier is exactly the 0.7.2 elif/else false-positive, so Go stays
# candidate-only: review ReplaceAll-to-empty hits against the surrounding guard.
#
# Arm note: only strings.ReplaceAll is matched. strings.Replace(s, marker, "", n)
# is NOT matched: n>0 means "at most n" (n==1 is a safe single replacement), and
# ast-grep's Go grammar parses strings.Replace(...) in a pattern as a
# type-conversion (qualified_type) with ERROR nodes -- statement-position only,
# so the arm would give unreliable recall. (strings.Replace with n<0 is the
# identical but rare spelling.)
id: wl001-go-replace-as-strip
language: Go
rule:
  pattern: strings.ReplaceAll($RECV, $LIT, "")
message: |
  WL001 (candidate): strings.ReplaceAll(x, marker, "") removes EVERY occurrence
  of the marker. If this is a prefix or suffix strip guarded by HasPrefix/
  HasSuffix, use strings.TrimPrefix / TrimSuffix. ast-grep flags the call site
  only — it does NOT prove a guard (Go's tree-sitter grammar cannot exclude else
  branches), so review before acting. (Go analogue of giturlparse #149, cf249252.)
severity: warning
metadata:
  code: WL001
  tier: pedantic
  origin: nephila/giturlparse#149
  cross_language: Go
  guard_proven: false   # tree-sitter-go has no else_clause node
