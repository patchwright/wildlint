# WL001 — replace-to-empty used as a prefix/suffix strip (JavaScript, .js)
# Real-bug origin (cross-language analogue): nephila/giturlparse #149 (Python),
# cf249252. JS nuance (load-bearing — this is the whole reason the rule changed):
#   - String.prototype.replace(marker, "") with a STRING argument replaces ONLY
#     the FIRST occurrence. That is the CORRECT, idiomatic prefix strip in JS
#     (there is no removeprefix) — NOT a bug. NOT flagged.
#   - String.prototype.replaceAll(marker, "") removes EVERY occurrence — the full
#     giturlparse shape (strips all, corrupting repeated markers). THIS is flagged.
#   - .replace(/regex/, "") is regex-driven, out of scope (not a literal marker).
#
# Tier note: PEDANTIC (candidate-only). This ast-grep rule fires on the call site
# only; it does NOT prove an enclosing startsWith/endsWith guard. Review each hit.
#
# ast-grep note: language: JavaScript only matches .js files. TypeScript (.ts)
# needs wl001-typescript.yml.
id: wl001-javascript-replace-as-strip
language: JavaScript   # matches .js; .ts needs wl001-typescript.yml
rule:
  pattern: $RECV.replaceAll($LIT, "")
message: |
  WL001 (candidate): $RECV.replaceAll(marker, "") removes EVERY occurrence of the
  marker (JS replaceAll is global). If this is a prefix or suffix strip, use a
  slice: s.startsWith(P) ? s.slice(P.length) : s. Note .replace(marker, "") is
  first-only and is the CORRECT strip — not flagged. ast-grep flags the call site
  only — it does NOT prove a startsWith/endsWith guard; review before acting.
  (JS analogue of giturlparse #149, cf249252.)
severity: warning
metadata:
  code: WL001
  tier: pedantic
  origin: nephila/giturlparse#149
  cross_language: JavaScript
