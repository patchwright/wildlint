# WL002 — str.split(' ') instead of split_whitespace() (Rust)
# Real-bug origin (cross-language analogue): derek73/python-nameparser #164
# (Python, 5c1954718cd). Rust's str::split(' ') keeps empty tokens and does not
# collapse runs ("a  b ".split(' ') -> ["a","","b",""]), whereas
# split_whitespace() collapses runs and ignores leading/trailing whitespace —
# the exact behavioral gap the Python rule warns about. Only an EXACT single
# space literal fires.
# ast-grep note: Rust str::split takes a Pattern, so ' ' (char_literal) and " "
# (string_literal) are distinct tree-sitter-rust node kinds -- ast-grep does not
# normalize between them. The char form `.split(' ')` is the one clippy enforces
# (clippy::single_char_add_str), so it dominates clippy-clean Rust and must be
# its own arm. Same bug class as the 0.7.0 WL001 JS .replace/.replaceAll split.
id: wl002-rust-split-single-space
language: Rust
rule:
  any:
    - pattern: $RECV.split(' ')
    - pattern: $RECV.split(" ")
message: |
  WL002: .split(' ') keeps empty tokens and will not collapse or trim
  whitespace; use .split_whitespace() (or .split_ascii_whitespace()) unless
  single-space splitting is genuinely intended.
  (Rust analogue of python-nameparser #164, 5c1954718cd.)
severity: warning
metadata:
  code: WL002
  tier: pedantic
  origin: derek73/python-nameparser#164
  cross_language: Rust
