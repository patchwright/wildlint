# WL001 — guarded replaceAll-to-empty as prefix/suffix strip (TypeScript, .ts)
# Real-bug origin (cross-language analogue): nephila/giturlparse #149 (Python),
# cf249252. TS/JS nuance (load-bearing):
#   - String.prototype.replace(marker, "") with a STRING argument replaces ONLY
#     the FIRST occurrence — that is the CORRECT prefix strip in TS (no
#     removeprefix). NOT a bug. NOT flagged.
#   - String.prototype.replaceAll(marker, "") removes EVERY occurrence — the full
#     giturlparse shape. Flagged, but only when guarded (see below).
#   - .replace(/regex/, "") is regex-driven, out of scope (not a literal marker).
#
# Guard-proven default tier: matches replaceAll only inside an if guarded by
# startsWith/endsWith on the same receiver + marker. Compound guards fall through
# to manual review.
#
# ast-grep mechanics: `inside` with `stopBy: end`; JS/TS if-pattern must be
# BRACELESS (`if ($COND) $$$BODY`). language: TypeScript matches .ts (.tsx needs
# language: Tsx — add a parallel rule if you scan .tsx). For .js use
# wl001-javascript.yml.
id: wl001-typescript-replace-as-strip
language: TypeScript
rule:
  pattern: $RECV.replaceAll($LIT, "")
  inside:
    stopBy: end
    any:
      - pattern: 'if ($RECV.startsWith($LIT)) $$$BODY'
      - pattern: 'if ($RECV.endsWith($LIT)) $$$BODY'
  # Exclude else / else-if branches — those run when the guard is FALSE (the
  # round-1 / 0.7.2 else-branch false positive). tree-sitter-typescript names
  # the else body else_clause; `else if` nests an if_statement inside it.
  # stopBy: end walks up to find it.
  not:
    inside:
      stopBy: end
      kind: else_clause
message: |
  WL001: $RECV.replaceAll(marker, "") inside `if ($RECV.startsWith(marker))`
  removes EVERY occurrence of the marker (TS replaceAll is global). Use a slice:
  s.startsWith(P) ? s.slice(P.length) : s. (.replace(marker, "") is first-only
  and is the correct strip — not flagged.) (TS analogue of giturlparse #149, cf249252.)
severity: warning
metadata:
  code: WL001
  tier: default
  origin: nephila/giturlparse#149
  cross_language: TypeScript
  guard_proven: true
