name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e . pytest
      - name: Tests
        run: python -m pytest -q
      - name: Smoke (python -m)
        run: python -m wildlint --version

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - name: Install ruff (pinned)
        run: pip install ruff==0.6.9
      - name: ruff check
        run: ruff check src tests
      - name: ruff format
        run: ruff format --check src tests

  type:
    # Type-check the (fully-hinted) Python core. The project's identity is "we
    # verify our own claims"; an unchecked type surface is an odd gap, and mypy
    # catches the class of "plausible-looking but subtly wrong" that bit the
    # 0.8.1 corpus-on-PR trigger (a YAML/expression bug, but the same mental-
    # model-vs-verify discipline). Runs default mypy (not --strict).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - name: Install
        run: pip install -e . mypy
      - name: mypy
        run: mypy src/wildlint

  ast-grep:
    # Regression suite for the multi-language ast-grep rule pack
    # (ast-grep-rules/). Mirrors the corpus gate's philosophy: a rule edit that
    # silently changes finding behavior fails here, before merge. Committed
    # snapshots (ast-grep-tests/__snapshots__/) are the stored expected output;
    # `sg test` re-derives and diffs them. See ast-grep-rules/README.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install ast-grep
        run: npm install -g @ast-grep/cli@0.44.0
      - name: sg test
        run: sg test
      # NOTE: the real-code corpus count-drift gate on PRs lives in its own
      # workflow (astgrep_corpus_pr.yml) using a server-side `on.pull_request.
      # paths:` filter. A step-level `if:` on github.event.pull_request.files was
      # tried in 0.8.1 and is BROKEN -- that field is not in the webhook payload,
      # so the step silently never ran. See astgrep_corpus_pr.yml.
