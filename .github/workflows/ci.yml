name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e . pytest
      - name: Tests
        run: python -m pytest -q
      - name: Smoke (python -m)
        run: python -m wildlint --version

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff (pinned)
        run: pip install ruff==0.6.9
      - name: ruff check
        run: ruff check src tests
      - name: ruff format
        run: ruff format --check src tests

  ast-grep:
    # Regression suite for the multi-language ast-grep rule pack
    # (ast-grep-rules/). Mirrors the corpus gate's philosophy: a rule edit that
    # silently changes finding behavior fails here, before merge. Committed
    # snapshots (ast-grep-tests/__snapshots__/) are the stored expected output;
    # `sg test` re-derives and diffs them. See ast-grep-rules/README.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install ast-grep
        run: npm install -g @ast-grep/cli@0.44.0
      - name: sg test
        run: sg test
      - name: ast-grep corpus_diff (real-code count drift)
        # Run on pushes and on PRs that touch the pack/config (not pure-Python
        # PRs -- they neither pay the ~90s clone cost nor get blocked by an
        # unrelated upstream-clone network flake). Closes the 0.7.0 trap at PR
        # time: a rule edit with hand-updated snapshots that drifts real counts
        # fails here before merge. 'stgrep' matches ast-grep-rules/tests and
        # scripts/astgrep_*; 'sgconfig' covers sgconfig.yml.
        if: ${{ github.event_name != 'pull_request' || contains(toJSON(github.event.pull_request.files.*.path), 'stgrep') || contains(toJSON(github.event.pull_request.files.*.path), 'sgconfig') }}
        run: SG_BIN=sg python3 scripts/astgrep_corpus_diff.py
