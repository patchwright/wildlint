name: Release

# Publishes to PyPI via Trusted Publishing (OIDC) — no API token stored.
# One-time setup on PyPI: add a "pending publisher" for project `wildlint`
# pointing at owner `patchwright`, repo `wildlint`, workflow `release.yml`.
# Then push a tag like `v0.1.0` to publish.

on:
  push:
    tags: ["v*"]

jobs:
  corpus:
    # Enforced gate: a tag cannot reach PyPI unless finding counts over the
    # pinned real-world corpus match scripts/corpus_baseline.json. Turns the old
    # "RELEASING.md checklist a human must remember" into pipeline enforcement --
    # a WL005-style regression (django 3 -> 34 hits) fails here, pre-publish,
    # instead of shipping at a 90% false-positive rate. Fails closed: if the job
    # itself errors it blocks a good release (recoverable), it never ships bad
    # code. See scripts/corpus_diff.py.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - name: corpus_diff (finding counts vs baseline)
        run: uv run --python 3.13 python scripts/corpus_diff.py

  build-and-publish:
    needs: corpus  # a tag physically cannot publish unless the corpus gate passed
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true  # idempotent: a re-tag of a published version is a no-op
